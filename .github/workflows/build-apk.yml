name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install buildozer and deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev build-essential cmake ccache
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Cache buildozer global
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-global-

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
          key: buildozer-local-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-local-

      - name: Build APK
        run: |
          rm -rf .buildozer/android/app 2>/dev/null || true
          yes | buildozer -v android debug 2>&1 | tee build.log | tail -300
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AVSearcher-APK
          path: bin/*.apk
          if-no-files-found: error
